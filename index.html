<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grey Heron v2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: #0f172a;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
  --accent: #4ade80;
  --text: #e2e8f0;
  --muted: #94a3b8;
}

* { box-sizing: border-box; }

body {
  margin:0;
  font-family: Inter, sans-serif;
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: var(--text);
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 24px;
}

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  backdrop-filter: blur(10px);
}

/* INPUTS */
input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: white;
}

/* BUTTON */
button {
  background: linear-gradient(135deg, #22c55e, #4ade80);
  border: none;
  padding: 10px 16px;
  border-radius: 10px;
  color: black;
  font-weight: 600;
  margin-top: 10px;
  cursor: pointer;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
  gap: 16px;
}

/* BIRD CARD */
.bird {
  transition: 0.2s;
}
.bird:hover {
  transform: translateY(-4px);
  border-color: var(--accent);
}

.small {
  font-size: 12px;
  color: var(--muted);
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.hidden { display:none; }

.search {
  margin-bottom: 20px;
}

/* IMAGE PREVIEW */
.preview {
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="login">
  <h1>🐦 Grey Heron</h1>
  <div class="card">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signIn()">Sign In</button>
    <button onclick="signUp()">Sign Up</button>
    <div id="error" class="small"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="header">
    <h2>My Birds</h2>
    <div>
      <span id="user"></span>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- ADD -->
  <div class="card">
    <h3>Add Bird</h3>
    <input id="name" placeholder="Bird name">
    <input id="species" placeholder="Species">
    <input id="location" placeholder="Location">
    <input id="lat" placeholder="Latitude">
    <input id="lng" placeholder="Longitude">
    <input type="file" id="image" onchange="previewImage()">
    <img id="img-preview" class="preview hidden"/>
    <button onclick="save()">Save Bird</button>
  </div>

  <!-- SEARCH -->
  <input class="search" id="search" placeholder="Search birds..." oninput="render()">

  <!-- LIST -->
  <div id="list" class="grid"></div>

</div>

</div>

<script>
const sb = supabase.createClient(
  "https://wkcdrxbokzxrvdihfoio.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrY2RyeGJva3p4cnZkaWhmb2lvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMDI5MDQsImV4cCI6MjA5MjY3ODkwNH0.JiJrTjdwRvpffXRFQRjU68haCecKd4qjoaMLiH1fMY0"
);

let user = null;
let birds = [];
let imageData = null;

/* AUTH */
async function init() {
  const { data } = await sb.auth.getSession();
  if (data.session) {
    user = data.session.user;
    showApp();
    load();
  }
}

async function signUp() {
  const { error } = await sb.auth.signUp({
    email: v('email'),
    password: v('password')
  });
  showError(error ? error.message : "Check email");
}

async function signIn() {
  const { data, error } = await sb.auth.signInWithPassword({
    email: v('email'),
    password: v('password')
  });
  if (error) return showError(error.message);
  user = data.user;
  showApp();
  load();
}

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

/* UI */
function showApp() {
  q('login').classList.add('hidden');
  q('app').classList.remove('hidden');
  q('user').innerText = user.email;
}

function showError(e) {
  q('error').innerText = e;
}

/* DATA */
async function load() {
  const { data } = await sb.from('bird_sightings')
    .select('*')
    .eq('user_id', user.id);

  birds = data || [];
  render();
}

async function save() {
  const lat = parseFloat(v('lat'));
  const lng = parseFloat(v('lng'));

  const bird = {
    user_id: user.id,
    bird_name: v('name'),
    species: v('species'),
    location: v('location'),
    image: imageData,
    location_lat: (!isNaN(lat) && !isNaN(lng)) ? lat : null,
    location_lng: (!isNaN(lat) && !isNaN(lng)) ? lng : null
  };

  const { data } = await sb.from('bird_sightings').insert([bird]);
  birds.unshift(data[0]);
  render();
}

/* RENDER */
function render() {
  const s = v('search').toLowerCase();

  const filtered = birds.filter(b =>
    (b.bird_name || '').toLowerCase().includes(s) ||
    (b.species || '').toLowerCase().includes(s)
  );

  q('list').innerHTML = filtered.map(b => `
    <div class="card bird">
      ${b.image ? `<img src="${b.image}" class="preview">` : ''}
      <h3>${b.bird_name || 'Unknown'}</h3>
      <div class="small">${b.species || ''}</div>
      <div class="small">📍 ${b.location || 'Unknown'}</div>
    </div>
  `).join('');
}

/* IMAGE PREVIEW */
function previewImage() {
  const file = q('image').files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    imageData = e.target.result;
    const img = q('img-preview');
    img.src = imageData;
    img.classList.remove('hidden');
  };
  reader.readAsDataURL(file);
}

/* HELPERS */
function v(id){ return q(id).value.trim(); }
function q(id){ return document.getElementById(id); }

/* INIT */
init();
</script>

</body>
</html>
